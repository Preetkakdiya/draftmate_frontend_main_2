{{- if .Values.qdrant.inCluster }}
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: {{ .Release.Namespace }}
  labels:
    app: qdrant
spec:
  ports:
    - port: 6333
      name: http
      targetPort: 6333
    - port: 6334
      name: grpc
      targetPort: 6334
  selector:
    app: qdrant
{{- end }}
