apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-nginx-config
  namespace: {{ .Release.Namespace }}
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 1024; }
    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;
        sendfile on;
        client_max_body_size 50M;
        proxy_read_timeout 600;
        proxy_connect_timeout 600;
        proxy_send_timeout 600;

        server {
            listen 8080;

            # Health Check Endpoint
            location /health {
                access_log off;
                return 200 'OK';
                add_header Content-Type text/plain;
            }

            # Converter Service (8000)
            location /converter/ {
                proxy_pass         http://converter:8000/;
                proxy_redirect     off;
                proxy_set_header   Host $host;
                proxy_set_header   X-Real-IP $remote_addr;
                proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Host $host;
                proxy_set_header   X-Forwarded-Proto $scheme;
            }

            # Query Service (8001)
            location /query/ {
                proxy_pass         http://query:8001/;
                proxy_redirect     off;
                proxy_set_header   Host $host;
                proxy_set_header   X-Real-IP $remote_addr;
                proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Host $host;
                proxy_set_header   X-Forwarded-Proto $scheme;
            }

            # Enhance Bot (8002)
            location /enhance/ {
                proxy_pass         http://enhance-bot:8002/;
                proxy_redirect     off;
                proxy_set_header   Host $host;
                proxy_set_header   X-Real-IP $remote_addr;
                proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Host $host;
                proxy_set_header   X-Forwarded-Proto $scheme;
            }

            # Drafter (8003)
            location /drafter/ {
                proxy_pass         http://drafter:8003/;
                proxy_redirect     off;
                proxy_set_header   Host $host;
                proxy_set_header   X-Real-IP $remote_addr;
                proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Host $host;
                proxy_set_header   X-Forwarded-Proto $scheme;
            }

            # Lex Bot (8004) - with SSE streaming support
            location /lexbot/ {
                proxy_pass         http://lexbot:8004/;
                proxy_redirect     off;
                proxy_set_header   Host $host;
                proxy_set_header   X-Real-IP $remote_addr;
                proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Host $host;
                proxy_set_header   X-Forwarded-Proto $scheme;
                
                # SSE streaming support
                proxy_buffering off;
                proxy_cache off;
                proxy_set_header Connection '';
                proxy_http_version 1.1;
                proxy_set_header X-Accel-Buffering no;
            }

            # PDF Editor (8005)
            location /pdf/ {
                proxy_pass         http://pdf-editor:8005/;
                proxy_redirect     off;
                proxy_set_header   Host $host;
                proxy_set_header   X-Real-IP $remote_addr;
                proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Host $host;
                proxy_set_header   X-Forwarded-Proto $scheme;
            }

            # Auth Service (8009)
            location /auth/ {
                proxy_pass         http://auth:8009/;
                proxy_redirect     off;
                proxy_set_header   Host $host;
                proxy_set_header   X-Real-IP $remote_addr;
                proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Host $host;
                proxy_set_header   X-Forwarded-Proto $scheme;
            }

            # Notification Service (8015)
            location /notification/ {
                proxy_pass         http://notification-service:8015/;
                proxy_redirect     off;
                proxy_set_header   Host $host;
                proxy_set_header   X-Real-IP $remote_addr;
                proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Host $host;
                proxy_set_header   X-Forwarded-Proto $scheme;
            }

            # Subscription Service (8016)
            location /subscriptions/ {
                proxy_pass         http://subscriptions:8016/;
                proxy_redirect     off;
                proxy_set_header   Host $host;
                proxy_set_header   X-Real-IP $remote_addr;
                proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Host $host;
                proxy_set_header   X-Forwarded-Proto $scheme;
            }

            # Case Search Service (8006)
            location /case_search/ {
                proxy_pass         http://case-search:8006/;
                proxy_redirect     off;
                proxy_set_header   Host $host;
                proxy_set_header   X-Real-IP $remote_addr;
                proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Host $host;
                proxy_set_header   X-Forwarded-Proto $scheme;
            }
        }
    }
