apiVersion: v1
kind: ResourceQuota
metadata:
  name: draftmate-quota
  namespace: {{ .Release.Namespace }}
spec:
  hard:
    requests.cpu: "8"
    requests.memory: "20Gi"
    limits.cpu: "25"
    limits.memory: "45Gi"
    pods: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: draftmate-limit-range
  namespace: {{ .Release.Namespace }}
spec:
  limits:
  - default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    type: Container
