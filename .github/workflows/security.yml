name: Post-Deployment Security Scans

on:
  workflow_run:
    workflows: ["DraftMate CI/CD Pipeline"]
    types:
      - completed

env:
  FRONTEND_IMAGE: preetkakdiya/draftmate-frontend
  BACKEND_IMAGE: preetkakdiya/draftmate-backend

jobs:
  security-scans:
    # Only run if the deployment workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # OWASP Dependency Check
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'draftmate'
          path: '.'
          format: 'HTML'

      # Upload OWASP Report
      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: OWASP-Report
          path: reports/dependency-check-report.html

      # Download Trivy HTML Template
      - name: Download Trivy HTML Template
        run: wget https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl

      # Trivy Scan Frontend
      - name: Run Trivy scan on Frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:latest
          format: 'template'
          template: '@html.tpl'
          output: 'frontend-report.html'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      # Trivy Scan Backend
      - name: Run Trivy scan on Backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:latest
          format: 'template'
          template: '@html.tpl'
          output: 'backend-report.html'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      # Upload Trivy HTML Reports
      - name: Upload Trivy HTML Reports
        uses: actions/upload-artifact@v4
        with:
          name: Trivy-HTML-Reports
          path: |
            frontend-report.html
            backend-report.html
